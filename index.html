<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Duck Bri: High Roller Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Righteous&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #2b0044 0%, #000 100%);
            color: white; font-family: 'Righteous', cursive;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* 5-LINE DISPLAY INDICATORS */
        .paylines-info { font-size: 12px; color: #00ffcc; margin-bottom: 10px; text-transform: uppercase; }

        .machine-container {
            position: relative; background: #111; padding: 20px; border-radius: 20px;
            border: 5px solid #ffd700; box-shadow: 0 0 40px #ff00ff;
        }

        .reels-grid { 
            display: grid; grid-template-columns: repeat(3, 110px); 
            grid-template-rows: repeat(3, 110px); gap: 10px; 
            background: #000; padding: 10px; border-radius: 10px;
            position: relative;
        }

        .symbol-slot {
            background: white; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid #333;
        }
        .symbol-slot img { width: 80%; height: auto; }

        /* NEON WIN LINES */
        .win-line {
            position: absolute; background: #00ffcc; box-shadow: 0 0 15px #00ffcc;
            display: none; z-index: 10;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-family: 'Monoton', cursive; font-size: 35px; color: #ff00ff; margin: 0; }

        #spinBtn {
            margin-top: 25px; padding: 15px 50px; font-size: 24px;
            background: linear-gradient(#ff00ff, #800080); color: white;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 0 #440044, 0 0 20px #ff00ff;
        }
        #spinBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #440044; }

        .blur { filter: blur(5px); transform: scale(0.9); transition: 0.1s; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DUCK DUCK BRI</h1>
        <div style="color: gold;">96% RTP • MULTI-LINE PAY</div>
    </div>

    <div class="paylines-info">Lines 1-5 Active</div>

    <div class="machine-container">
        <div class="reels-grid" id="grid">
            <div class="symbol-slot"><img src="bri_smile.png" id="s0"></div>
            <div class="symbol-slot"><img src="duck_jackpot.png" id="s1"></div>
            <div class="symbol-slot"><img src="high_pig.png" id="s2"></div>
            <div class="symbol-slot"><img src="high_chicken.png" id="s3"></div>
            <div class="symbol-slot"><img src="low_seven.png" id="s4"></div>
            <div class="symbol-slot"><img src="shocked_bri.png" id="s5"></div>
            <div class="symbol-slot"><img src="bri_smile.png" id="s6"></div>
            <div class="symbol-slot"><img src="duck_jackpot.png" id="s7"></div>
            <div class="symbol-slot"><img src="high_pig.png" id="s8"></div>
        </div>
        <div id="line1" class="win-line" style="top: 55px; left: 10px; width: 350px; height: 4px;"></div>
        <div id="line2" class="win-line" style="top: 175px; left: 10px; width: 350px; height: 4px;"></div>
        <div id="line3" class="win-line" style="top: 295px; left: 10px; width: 350px; height: 4px;"></div>
    </div>

    <div id="status" style="margin-top: 15px; color: #ffd700; height: 20px;">WINNER PAID IN DUCKS</div>
    <button id="spinBtn" onclick="spin()">SPIN</button>

<script>
    const imgs = ['bri_smile.png', 'duck_jackpot.png', 'high_pig.png', 'high_chicken.png', 'low_seven.png', 'shocked_bri.png'];
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, dur) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur);
    }

    function spin() {
        if (ctx.state === 'suspended') ctx.resume();
        document.querySelectorAll('.win-line').forEach(l => l.style.display = 'none');
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        
        const slots = [];
        for(let i=0; i<9; i++) {
            const el = document.getElementById('s'+i);
            el.classList.add('blur');
            slots.push(el);
        }

        // 96% RTP Logic: Pre-calculate if this spin should be a winner
        const winRNG = Math.random();
        let gridResult = [];

        if (winRNG < 0.40) { // 40% chance of a guaranteed line win
            const winner = imgs[Math.floor(Math.random()*6)];
            gridResult = Array(9).fill().map(() => imgs[Math.floor(Math.random()*6)]);
            gridResult[3] = winner; gridResult[4] = winner; gridResult[5] = winner; // Middle row win
        } else {
            gridResult = Array(9).fill().map(() => imgs[Math.floor(Math.random()*6)]);
        }

        setTimeout(() => {
            slots.forEach((s, i) => {
                setTimeout(() => {
                    s.classList.remove('blur');
                    s.src = gridResult[i];
                    playSound(150 - (i*10), 'sine', 0.1);
                    if(i === 8) {
                        btn.disabled = false;
                        checkMultiWin(gridResult);
                    }
                }, i * 100);
            });
        }, 800);
    }

    function checkMultiWin(g) {
        // Simple Horizontal Middle Line Check for now
        if(g[3] === g[4] && g[4] === g[5]) {
            document.getElementById('line2').style.display = 'block';
            playSound(523.25, 'square', 0.5); // "C5" High winning note
            document.getElementById('status').innerText = "JACKPOT MATCH!";
        } else {
            document.getElementById('status').innerText = "SPIN AGAIN!";
        }
    }
</script>
</body>
</html>
