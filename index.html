<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Duck Bri Deluxe</title>
    <style>
        body { 
            background: radial-gradient(circle, #220033 0%, #050505 100%); 
            color: white; font-family: 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* BANNER AREA - Uses your Winking Bri icon */
        .header-art {
            text-align: center; margin-bottom: 10px;
        }
        .header-art img { width: 120px; filter: drop-shadow(0 0 15px #ff00ff); }
        h1 { margin: 5px 0; font-size: 24px; color: #ffd700; text-shadow: 0 0 10px gold; font-style: italic; }

        .jackpot { font-size: 40px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; font-family: monospace; margin-bottom: 20px; }

        /* THE MACHINE */
        .machine {
            background: rgba(255, 255, 255, 0.07);
            padding: 20px; border-radius: 30px; border: 4px solid #444;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .reels { display: flex; gap: 15px; background: #000; padding: 15px; border-radius: 20px; }
        .reel {
            width: 90px; height: 120px; background: #1a1a1a;
            border-radius: 12px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
        }
        .reel img { width: 80%; height: auto; }

        /* BUTTON */
        #spinBtn {
            margin-top: 30px; padding: 18px 60px;
            font-size: 26px; font-weight: 900; color: white;
            background: linear-gradient(180deg, #ff00ff, #800080);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px 0 #500050, 0 0 20px rgba(255,0,255,0.4);
            transition: 0.1s;
        }
        #spinBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #500050; }
        #spinBtn:disabled { background: #333; box-shadow: none; color: #666; }

        .spin-anim { animation: blurMove 0.1s infinite linear; }
        @keyframes blurMove { from { filter: blur(2px); transform: translateY(-3px); } to { filter: blur(6px); transform: translateY(3px); } }
    </style>
</head>
<body>

    <div class="header-art">
        <img src="winking_bri.png">
        <h1>✨ DUCK DUCK BRI ✨</h1>
    </div>
    
    <div class="jackpot" id="jpDisp">$5,000.00</div>

    <div class="machine">
        <div class="reels">
            <div class="reel"><img src="bri_smile.png" id="r1"></div>
            <div class="reel"><img src="bri_smile.png" id="r2"></div>
            <div class="reel"><img src="bri_smile.png" id="r3"></div>
        </div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN</button>
    <p id="msg" style="color: #00ffcc; font-size: 18px; margin-top: 20px;">READY TO WIN?</p>

<script>
    const images = ['bri_smile.png', 'duck_jackpot.png', 'high_pig.png', 'high_chicken.png', 'low_seven.png', 'shocked_bri.png'];
    let playing = false;

    function spin() {
        if (playing) return;
        playing = true;
        const btn = document.getElementById('spinBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        msg.innerText = "LUCK IS SPINNING...";

        const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
        reels.forEach(r => r.classList.add('spin-anim'));

        // Pick winners
        const results = [
            images[Math.floor(Math.random() * images.length)],
            images[Math.floor(Math.random() * images.length)],
            images[Math.floor(Math.random() * images.length)]
        ];

        setTimeout(() => {
            reels.forEach((img, i) => {
                setTimeout(() => {
                    img.classList.remove('spin-anim');
                    img.src = results[i];
                    if (i === 2) {
                        playing = false;
                        btn.disabled = false;
                        if(results[0] === results[1] && results[1] === results[2]) {
                            msg.innerText = "💰 MEGA WIN!!! 💰";
                        } else {
                            msg.innerText = "SPIN AGAIN!";
                        }
                    }
                }, i * 500);
            });
        }, 1000);
    }
</script>
</body>
</html>
